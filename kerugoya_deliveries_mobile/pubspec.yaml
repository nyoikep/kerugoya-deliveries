name: kerugoya_deliveries_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  google_maps_flutter: ^2.15.0
  location: ^8.0.1
  socket_io_client: ^3.1.4
  shared_preferences: ^2.5.4
  jwt_decoder: ^2.0.1
  intl: ^0.20.2
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.10.13
  webview_flutter_wkwebview: ^3.16.3
  internet_connection_checker: ^3.0.1
  video_player: ^2.9.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo.jpg
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
     - assets/
